name: Build APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      with-rust:
        description: 'Build Rust native library (slower)'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22'
          channel: 'stable'
          cache: true

      - name: Verify Flutter
        run: flutter doctor

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: quizmaster-apk
          path: build/app/outputs/flutter-apk/*.apk
          compression-level: 9
          retention-days: 30

  build-with-rust:
    if: github.event.inputs.with-rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22'
          channel: 'stable'
          cache: true

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          add-to-path: true
          local-cache: true

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            rust/target
            ~/.cargo/registry
          key: rust-${{ runner.os }}-${{ hashFiles('rust/Cargo.lock', 'rust/Cargo.toml') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust .so libraries
        run: |
          cd rust
          cargo ndk \
            -t arm64-v8a \
            -t armeabi-v7a \
            -t x86_64 \
            -t x86 \
            -o ../android/app/src/main/jniLibs \
            build --release

      - name: Build Flutter APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs (Rust)
        uses: actions/upload-artifact@v4
        with:
          name: quizmaster-apk-rust
          path: build/app/outputs/flutter-apk/*.apk
          compression-level: 9
          retention-days: 30
